<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>凹柏林 · Albert Lin · 林梓安</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Dela+Gothic+One&family=Zen+Maru+Gothic:wght@900&display=swap" rel="stylesheet">

  <style>
    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --page-bg:   #EDE8E0;
      --page-text: #1C1C1C;
      --muted:     #7A7060;
      --gold:      #C9A84C;
      --coral:     #FF3D5E;
      --navy:      #0A1628;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--page-bg);
      color: var(--page-text);
      font-family: 'Space Grotesk', 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle paper grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
    }

    /* =============================================
       LANDING
    ============================================= */
    #landing {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: clamp(36px, 7vh, 72px) clamp(24px, 8vw, 110px);
      display: flex;
      flex-direction: column;
      gap: clamp(24px, 4vh, 44px);
    }

    /* --- Header --- */
    .hero-header { animation: fadeUp 0.65s ease both; }

    .greeting {
      font-size: clamp(12px, 1.2vw, 16px);
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* Three equal-hierarchy names */
    .name-row {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0;
      margin-bottom: 14px;
      line-height: 1;
    }

    .name-en {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(30px, 4.2vw, 58px);
      font-weight: 600;
      color: #1C1C1C;
      letter-spacing: -0.02em;
    }

    @keyframes nickJiggle {
      0%   { transform: rotate(-4deg); }
      20%  { transform: rotate(-9deg) scale(1.07); }
      45%  { transform: rotate(-2deg) scale(1.03); }
      70%  { transform: rotate(-7deg); }
      100% { transform: rotate(-4deg); }
    }

    .name-nick {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: clamp(30px, 4.2vw, 58px);
      font-weight: 900;
      color: var(--coral);
      letter-spacing: 0.02em;
      display: inline-block;
      transform: rotate(-4deg);
      transform-origin: center bottom;
    }
    .name-nick.jiggle {
      animation: nickJiggle 0.55s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    .name-zh {
      font-family: 'Noto Serif TC', serif;
      font-size: clamp(30px, 4.2vw, 58px);
      font-weight: 900;
      color: #3A2D1E;
      letter-spacing: 0.1em;
    }

    .name-sep {
      font-size: clamp(20px, 2.8vw, 38px);
      color: rgba(28,28,28,0.18);
      padding: 0 clamp(8px, 1.1vw, 16px);
      font-weight: 300;
      font-family: 'Space Grotesk', sans-serif;
    }

    .tagline {
      font-size: clamp(14px, 1.5vw, 19px);
      color: var(--muted);
      font-weight: 300;
    }

    /* =============================================
       BUTTONS GRID
    ============================================= */
    .buttons-grid {
      animation: fadeUp 0.65s 0.1s ease both;
      display: grid;
      grid-template-columns: 5fr 7fr;
      grid-template-rows: auto auto;
      gap: clamp(10px, 1.1vw, 15px);
      max-width: min(1080px, 100%);
    }

    .btn-card {
      cursor: pointer;
      border: none;
      text-align: left;
      padding: clamp(20px, 2.8vw, 36px);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: clamp(145px, 17vw, 220px);
      transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1),
                  box-shadow 0.3s ease, opacity 0.35s ease;
    }

    .btn-card:focus-visible {
      outline: 3px solid white;
      outline-offset: 3px;
    }

    /* 1 · Work */
    #btn-work {
      background: var(--navy);
      color: #F0EBE0;
      border-radius: 6px;
      transform: rotate(-1.6deg);
      box-shadow: 4px 6px 28px rgba(10,22,40,.28);
      grid-column: 1; grid-row: 1;
    }
    #btn-work:hover { transform: rotate(0) scale(1.025); box-shadow: 8px 14px 44px rgba(10,22,40,.4); }
    #btn-work .btn-eyebrow { color: var(--gold); }
    #btn-work .btn-label   { font-family: 'Noto Serif TC', serif; }
    #btn-work .btn-deco    { color: var(--gold); font-size: 20px; }

    /* 2 · Speaking */
    #btn-speaking {
      background: linear-gradient(148deg, #130730 0%, #1547A8 100%);
      color: #FFF;
      border-radius: 22px;
      transform: rotate(0.8deg);
      box-shadow: 6px 8px 36px rgba(19,7,48,.45);
      grid-column: 2; grid-row: 1;
    }
    #btn-speaking:hover { transform: rotate(0) scale(1.025); box-shadow: 10px 18px 52px rgba(19,7,48,.55); }
    #btn-speaking .btn-eyebrow { color: #7FEAFF; font-size: 11px; }
    #btn-speaking .btn-deco    { color: rgba(127,234,255,.4); font-size: 36px; line-height:1; }

    /* 3 · Collab */
    #btn-collab {
      background: var(--coral);
      color: #FFF3E4;
      border-radius: 48px 8px 8px 8px;
      transform: rotate(1.3deg);
      box-shadow: 4px 6px 30px rgba(255,61,94,.38);
      grid-column: 1; grid-row: 2;
    }
    #btn-collab:hover { transform: rotate(0) scale(1.025); box-shadow: 8px 14px 46px rgba(255,61,94,.48); }
    #btn-collab .btn-eyebrow { color: #BDFF00; }
    #btn-collab .btn-deco    { color: rgba(189,255,0,.5); font-size: 28px; }

    /* 4 · AI */
    #btn-ai {
      background: #0D1117;
      color: #00FF94;
      border-radius: 8px;
      transform: rotate(-0.5deg);
      box-shadow: 4px 6px 28px rgba(0,0,0,.55);
      border: 1px solid rgba(0,255,148,.14);
      grid-column: 2; grid-row: 2;
    }
    #btn-ai:hover { transform: rotate(0) scale(1.025); box-shadow: 6px 12px 44px rgba(0,0,0,.65), 0 0 48px rgba(0,255,148,.08); }
    #btn-ai .btn-eyebrow { color: #00C8FF; font-family: 'Space Mono', monospace; font-size: 11px; }
    #btn-ai .btn-label   { font-family: 'Space Mono', monospace; }
    #btn-ai .btn-deco    { color: rgba(0,200,255,.45); font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: .04em; }

    .btn-eyebrow {
      font-size: 11px;
      letter-spacing: .13em;
      text-transform: uppercase;
      opacity: .85;
      margin-bottom: 8px;
      font-family: 'Space Grotesk', sans-serif;
    }
    .btn-label {
      font-size: clamp(16px, 2.1vw, 28px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -.01em;
    }

    /* =============================================
       OVERLAY
    ============================================= */
    #overlay {
      position: fixed;
      z-index: 800;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    #overlay-scroll {
      position: absolute;
      inset: 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity .38s ease;
    }

    #overlay-scroll.show { opacity: 1; }

    #overlay-inner {
      padding: clamp(52px, 8vh, 92px) clamp(28px, 10vw, 140px) 80px;
      min-height: 100%;
    }

    .content-wrap { max-width: 800px; }

    /* Generic card typography */
    .c-eyebrow {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      opacity: .38;
      margin-bottom: 20px;
      font-family: 'Space Grotesk', sans-serif;
    }
    .c-headline {
      font-size: clamp(34px, 5.5vw, 68px);
      font-weight: 700;
      line-height: 1.06;
      letter-spacing: -.025em;
      margin-bottom: 26px;
    }
    .c-intro {
      font-size: clamp(15px, 1.3vw, 18px);
      line-height: 1.78;
      opacity: .82;
      max-width: 600px;
      margin-bottom: 40px;
    }
    .c-divider {
      height: 1px;
      background: rgba(255,255,255,.12);
      margin-bottom: 26px;
    }
    .c-section-label {
      font-size: 11px;
      letter-spacing: .15em;
      text-transform: uppercase;
      opacity: .38;
      margin-bottom: 14px;
      font-family: 'Space Grotesk', sans-serif;
    }
    .c-services {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 11px;
      margin-bottom: 40px;
    }
    .c-service {
      padding: 16px 18px;
      border-radius: 10px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.1);
    }
    .c-service-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
    .c-service-desc  { font-size: 13px; opacity: .62; line-height: 1.52; }
    .c-cta-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .c-cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 12px 28px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
      white-space: nowrap;
    }
    .c-cta-btn:hover { transform: scale(1.05); box-shadow: 0 8px 28px rgba(0,0,0,.28); }
    .c-cta-note { font-size: 13px; opacity: .42; word-break: break-all; }

    .c-tools-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 40px;
    }
    .c-tool-chip {
      padding: 5px 13px;
      border-radius: 100px;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.02em;
      border: 1px solid;
    }

    /* Instagram block */
    .c-ig-block {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    .c-ig-label {
      font-size: 11px;
      letter-spacing: .15em;
      text-transform: uppercase;
      opacity: .38;
      font-family: 'Space Grotesk', sans-serif;
    }
    .c-ig-handle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #FFF3E4;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .01em;
      padding: 8px 18px;
      border-radius: 100px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      transition: background .2s ease, transform .2s ease;
    }
    .c-ig-handle:hover {
      background: rgba(255,255,255,.18);
      transform: scale(1.04);
    }

    /* Contract button */
    .c-contract-btn {
      margin-top: 20px;
      background: transparent;
      border: 1px solid rgba(255,243,228,.25);
      color: rgba(255,243,228,.55);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: .02em;
      transition: all .2s ease;
      display: inline-block;
    }
    .c-contract-btn:hover {
      background: rgba(255,255,255,.08);
      color: rgba(255,243,228,.85);
      border-color: rgba(255,243,228,.4);
    }

    /* =============================================
       AI CARD CONTENT
    ============================================= */
    .ai-section { margin-bottom: 32px; }

    .ai-section-title {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #00C8FF;
      letter-spacing: .07em;
      margin-bottom: 14px;
      opacity: .75;
    }

    .ai-prose {
      font-size: clamp(14px, 1.25vw, 16px);
      line-height: 1.82;
      color: rgba(0,255,148,.7);
      font-family: 'Space Grotesk', sans-serif;
      max-width: 640px;
    }

    .ai-prose + .ai-prose { margin-top: 14px; }

    .ai-conditions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 18px;
    }

    .ai-chip {
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      color: #00C8FF;
      background: rgba(0,200,255,.07);
      border: 1px solid rgba(0,200,255,.22);
      padding: 5px 12px;
      border-radius: 4px;
      letter-spacing: .02em;
    }

    .ai-not-for {
      margin-top: 22px;
      padding: 16px 20px;
      border-left: 2px solid rgba(0,200,255,.25);
      background: rgba(0,0,0,.25);
      border-radius: 0 8px 8px 0;
    }

    .ai-not-title {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(0,200,255,.45);
      letter-spacing: .08em;
      margin-bottom: 12px;
    }

    .ai-not-item {
      font-size: 13px;
      font-family: 'Space Grotesk', sans-serif;
      color: rgba(0,255,148,.45);
      line-height: 1.65;
      padding-left: 18px;
      position: relative;
      margin-bottom: 8px;
    }
    .ai-not-item:last-child { margin-bottom: 0; }
    .ai-not-item::before {
      content: '>';
      position: absolute;
      left: 0;
      color: rgba(0,200,255,.4);
      font-family: 'Space Mono', monospace;
    }

    /* Contract Modal */
    #contract-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #contract-modal.open { display: flex; }

    .contract-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .contract-box {
      position: relative;
      z-index: 1;
      background: #1A1008;
      border: 1px solid rgba(201,168,76,.3);
      border-radius: 16px;
      padding: 40px 44px;
      max-width: 560px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      color: #F0EBE0;
      font-family: 'Space Grotesk', sans-serif;
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
      animation: contractIn .3s cubic-bezier(.34,1.4,.64,1) both;
    }

    @keyframes contractIn {
      from { opacity:0; transform: scale(.92) translateY(12px); }
      to   { opacity:1; transform: scale(1)  translateY(0); }
    }

    .contract-close {
      position: absolute;
      top: 16px;
      right: 18px;
      background: rgba(255,255,255,.08);
      border: none;
      color: rgba(240,235,224,.6);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s ease;
    }
    .contract-close:hover { background: rgba(255,255,255,.15); color: #F0EBE0; }

    .contract-eyebrow {
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #C9A84C;
      margin-bottom: 12px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .contract-title {
      font-size: 22px;
      font-weight: 700;
      color: #F0EBE0;
      margin-bottom: 28px;
      letter-spacing: -.01em;
    }

    .contract-terms {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contract-terms li {
      font-size: 14px;
      line-height: 1.7;
      color: rgba(240,235,224,.78);
      padding-left: 20px;
      position: relative;
    }

    .contract-terms li::before {
      content: '*';
      position: absolute;
      left: 0;
      color: #C9A84C;
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .contract-box { padding: 28px 22px; }
    }

    /* =============================================
       RESUME (work card specific)
    ============================================= */
    .resume-lang-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .rl-btn {
      padding: 5px 16px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(201,168,76,.35);
      background: transparent;
      color: rgba(240,235,224,.45);
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: .05em;
      transition: all .2s ease;
    }
    .rl-btn.active {
      background: var(--gold);
      color: var(--navy);
      border-color: var(--gold);
    }

    .resume-content { display: block; }

    .rs-section { margin-bottom: 36px; }

    .rs-section-title {
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
      font-family: 'Space Grotesk', sans-serif;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(201,168,76,.2);
    }

    .rs-entry {
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(240,235,224,.07);
    }
    .rs-entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    .rs-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .rs-org   { font-size: 15px; font-weight: 700; color: #F0EBE0; display: block; }
    .rs-role  { font-size: 12px; color: rgba(240,235,224,.55); display: block; margin-top: 2px; }
    .rs-date  {
      font-size: 11px;
      color: var(--gold);
      white-space: nowrap;
      flex-shrink: 0;
      font-family: 'Space Mono', monospace;
    }

    .rs-sub { margin-top: 14px; }

    .rs-sub-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(201,168,76,.7);
      margin-bottom: 7px;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: .03em;
    }

    .rs-bullets {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .rs-bullets li {
      font-size: 13px;
      line-height: 1.65;
      color: rgba(240,235,224,.72);
      padding-left: 16px;
      position: relative;
    }
    .rs-bullets li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: rgba(201,168,76,.6);
      font-size: 10px;
      top: 4px;
    }

    /* =============================================
       CLOSE BUTTON
    ============================================= */
    #close-btn {
      position: fixed;
      top: 22px;
      right: 26px;
      z-index: 900;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.28);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: rgba(255,255,255,.9);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease, transform .2s ease, background .2s ease;
      font-family: 'Space Grotesk', sans-serif;
    }
    #close-btn.show { opacity: 1; pointer-events: all; }
    #close-btn:hover { transform: scale(1.12) rotate(90deg); background: rgba(0,0,0,.5); }

    /* =============================================
       ANIMATIONS & RESPONSIVE
    ============================================= */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 680px) {
      .buttons-grid { grid-template-columns: 1fr 1fr; }
      .btn-card { transform: none !important; min-height: 140px; }
      #btn-collab { border-radius: 20px; }
      .c-services { grid-template-columns: 1fr; }
      .name-hero { font-size: clamp(56px, 18vw, 96px); }
      .rs-header { flex-direction: column; gap: 4px; }
      .btn-label { font-size: clamp(14px, 3.8vw, 18px); }
    }

    @media (max-width: 480px) {
      #overlay-inner { padding: 52px 20px 52px; }
    }
  </style>
</head>
<body>

<!-- =============================================
     LANDING
============================================= -->
<section id="landing">
  <header class="hero-header">
    <p class="greeting">Hi，我是</p>
    <div class="name-row">
      <span class="name-en">Albert Lin</span>
      <span class="name-sep">·</span>
      <span class="name-zh">林梓安</span>
      <span class="name-sep">·</span>
      <span class="name-nick">凹柏林</span>
    </div>
    <p class="tagline">找我有什麼事嗎？</p>
  </header>

  <div class="buttons-grid">

  activeRect = btnEl.getBoundingClientRect();

  // Build content
  if      (cardId === 'work') cwrap.innerHTML = buildWorkContent(data);
  else if (cardId === 'ai')   cwrap.innerHTML = buildAIContent(data);
  else                        cwrap.innerHTML = buildContent(data);

  // Style overlay
  overlay.style.background  = data.bg;
  overlay.style.color       = data.color;
  overlay.style.fontFamily  = data.font;

  // Position at button (no transition)
  overlay.style.transition    = 'none';
  overlay.style.borderRadius  = getComputedStyle(btnEl).borderRadius;
  overlay.style.top    = activeRect.top    + 'px';
  overlay.style.left   = activeRect.left   + 'px';
  overlay.style.width  = activeRect.width  + 'px';
  overlay.style.height = activeRect.height + 'px';
  overlay.style.opacity       = '0';
  overlay.style.pointerEvents = 'all';
  oscroll.classList.remove('show');
  oscroll.style.overflow = 'hidden';

  // Fade out all buttons
  document.querySelectorAll('.btn-card').forEach(b => {
    b.style.transition    = 'opacity .22s ease';
    b.style.opacity       = '0';
    b.style.pointerEvents = 'none';
  });

  // Reveal overlay then expand
  requestAnimationFrame(() => {
    overlay.style.opacity = '1';
    overlay.getBoundingClientRect(); // force reflow

    overlay.style.transition = [
      'top .52s cubic-bezier(.4,0,.2,1)',
      'left .52s cubic-bezier(.4,0,.2,1)',
      'width .52s cubic-bezier(.4,0,.2,1)',
      'height .52s cubic-bezier(.4,0,.2,1)',
      'border-radius .52s cubic-bezier(.4,0,.2,1)',
    ].join(',');

    overlay.style.top          = '0';
    overlay.style.left         = '0';
    overlay.style.width        = '100vw';
    overlay.style.height       = '100vh';
    overlay.style.borderRadius = '0';
  });

  document.body.style.overflow = 'hidden';

  setTimeout(() => {
    oscroll.style.overflow = 'auto';
    oscroll.classList.add('show');
    closeBtn.classList.add('show');
  }, 500);
}

/* =============================================
   CLOSE
============================================= */
function closeCard() {
  if (!isOpen) return;

  const overlay  = document.getElementById('overlay');
  const oscroll  = document.getElementById('overlay-scroll');
  const closeBtn = document.getElementById('close-btn');

  oscroll.classList.remove('show');
  oscroll.style.overflow = 'hidden';
  closeBtn.classList.remove('show');

  setTimeout(() => {
    overlay.style.transition = [
      'top .46s cubic-bezier(.4,0,.2,1)',
      'left .46s cubic-bezier(.4,0,.2,1)',
      'width .46s cubic-bezier(.4,0,.2,1)',
      'height .46s cubic-bezier(.4,0,.2,1)',
      'border-radius .46s cubic-bezier(.4,0,.2,1)',
      'opacity .38s ease .1s',
    ].join(',');
    overlay.style.top          = activeRect.top    + 'px';
    overlay.style.left         = activeRect.left   + 'px';
    overlay.style.width        = activeRect.width  + 'px';
    overlay.style.height       = activeRect.height + 'px';
    overlay.style.borderRadius = getComputedStyle(activeBtn).borderRadius;
    overlay.style.opacity      = '0';
  }, 80);

  document.querySelectorAll('.btn-card').forEach(b => {
    b.style.transition    = 'opacity .3s ease .12s';
    b.style.opacity       = '1';
    b.style.pointerEvents = '';
  });

  document.body.style.overflow = '';

  setTimeout(() => {
    overlay.style.pointerEvents = 'none';
    overlay.style.transition    = 'none';
    overlay.style.opacity       = '0';
    isOpen     = false;
    activeBtn  = null;
    activeRect = null;
  }, 640);
}

============================================= */

  return `

    <div class="c-cta-row" style="margin-bottom:40px">
      <a href="${data.ctaHref}" target="_blank" rel="noopener"
         class="c-cta-btn"
         style="background:${data.ctaBg};color:${data.ctaColor};font-family:${data.font}">
        ${GMAIL_ICON}
        ${data.ctaText}
      </a>
      <span class="c-cta-note">${data.note}</span>

function switchResumeLang(lang) {
  document.getElementById('resume-zh').style.display = lang === 'zh' ? 'block' : 'none';
  document.getElementById('resume-en').style.display = lang === 'en' ? 'block' : 'none';
  document.getElementById('rl-zh').classList.toggle('active', lang === 'zh');
  document.getElementById('rl-en').classList.toggle('active', lang === 'en');
}

/* =============================================
   CONTRACT MODAL
============================================= */
function openContract() {
  document.getElementById('contract-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeContract() {
  document.getElementById('contract-modal').classList.remove('open');
  // restore scroll to overlay (which is already locked)
}

/* =============================================
   KEYBOARD
============================================= */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('contract-modal');
    if (modal.classList.contains('open')) {
      closeContract();
    } else if (isOpen) {
      closeCard();
    }
  }
});

// 凹柏林 jiggle on collab hover/touch
(function() {
  const btnCollab = document.getElementById('btn-collab');
  const nameNick  = document.querySelector('.name-nick');
  if (!btnCollab || !nameNick) return;
  const triggerJiggle = () => {
    nameNick.classList.remove('jiggle');
    void nameNick.offsetWidth; // force reflow
    nameNick.classList.add('jiggle');
  };
  btnCollab.addEventListener('mouseenter', triggerJiggle);
  btnCollab.addEventListener('touchstart', triggerJiggle, { passive: true });
  nameNick.addEventListener('animationend', () => nameNick.classList.remove('jiggle'));
})();
</script>
